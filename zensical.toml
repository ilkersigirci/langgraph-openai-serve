[project]
site_name = "LangGraph OpenAI Serve"
site_dir = "public"
site_url = "https://ilkersigirci.github.io/langgraph-openai-serve/"
site_description = "Serve LangGraph graphs through an OpenAI-compatible API"
site_author = "İlker SIĞIRCI"
edit_uri = "edit/main/docs/"
repo_url = "https://github.com/ilkersigirci/langgraph-openai-serve"
repo_name = "ilkersigirci/langgraph-openai-serve"
copyright = "Maintained by <a href=\"https://blog.ilkerflix.com\">İlker SIĞIRCI</a>."
docs_dir = "docs"
nav = [
  { Home = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Demo Stack" = [
    "demo/index.md",
    { "Run the Demo API" = "demo/api.md" },
    { "Example Graphs" = "demo/graphs.md" },
    { "Docker Compose" = "demo/docker.md" },
    { "Chainlit Client" = "demo/chainlit.md" },
    { "Open WebUI Functions" = "demo/open-webui.md" },
    { "Bifrost Gateway" = "demo/bifrost.md" },
    { "Settings and Commands" = "demo/reference.md" },
  ]},
  { Tutorials = [
    "tutorials/index.md",
    { "Creating Custom Graphs" = "tutorials/custom-graphs.md" },
    { "Connecting with OpenAI Clients" = "tutorials/openai-clients.md" },
  ]},
  { "How-To Guides" = [
    "how-to-guides/index.md",
    { "LangGraph Runtime Settings" = "how-to-guides/langgraph-runtime-settings.md" },
    { Authentication = "how-to-guides/authentication.md" },
    { "OpenAI-Compatible Proxies" = "how-to-guides/openai-proxies.md" },
  ]},
  { Explanation = [
    "explanation/index.md",
    { "Architecture Overview" = "explanation/architecture.md" },
    { "LangGraph Integration" = "explanation/langgraph-integration.md" },
    { "OpenAI API Compatibility" = "explanation/openai-compatibility.md" },
  ]},
  { Reference = "reference.md" },
]

[project.theme]
variant = "modern"
features = [
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "content.tooltips",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[project.theme.icon]
logo = "lucide/workflow"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
show_root_heading = false
show_submodules = true
docstring_style = "google"
docstring_section_style = "table"
line_length = 88
merge_init_into_class = true
show_signature = true
show_signature_annotations = false
separate_signature = true
show_bases = true
show_source = true

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ilkersigirci"

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
auto_append = ["includes/abbreviations.md"]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.abbr]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.tables]

[project.markdown_extensions.def_list]
