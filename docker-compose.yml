name: lgos

networks:
  lgos-network:
    name: lgos-network
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.31.0/24

services:
  lgos-postgres:
    image: postgres:18.4-alpine3.23
    container_name: lgos-postgres
    restart: "no"
    networks:
      - lgos-network
    ports:
      - 5432:5432
    volumes:
      - ./docker/volumes/lgos-db:/var/lib/postgresql
    environment:
      POSTGRES_USER: lgos
      POSTGRES_PASSWORD: lgos
      POSTGRES_DB: lgos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lgos -d lgos"]
      interval: 5s
      timeout: 5s
      retries: 5

  lgos-demo-api:
    image: lgos-demo-api:latest
    container_name: lgos-demo-api
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    networks:
      - lgos-network
    depends_on:
      lgos-postgres:
        condition: service_healthy
    pre_start:
      - command: ["uv", "run", "--module", "demo.api.setup_checkpointer"]
    ports:
      - 8000:8000
    # command: ["tail", "-f", "/dev/null"] # NOTE: For testing the container
    command: ["uv", "run", "--module", "demo.api.app"]
    restart: "no"
    volumes:
      - ./docs:/app/docs # NOTE: For RAG graph
    env_file:
      - .env
    environment:
      DEMO_POSTGRES_URI: postgresql://lgos:lgos@lgos-postgres:5432/lgos
    develop:
      watch:
        # Avoid recursively watching Docker-owned PostgreSQL volume data.
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - "**/__pycache__/"
        - action: sync
          path: ./demo
          target: /app/demo
          ignore:
            - "**/__pycache__/"
            - tests/
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock

  lgos-bifrost:
    image: maximhq/bifrost:v1.6.3@sha256:95caedb1c368c6d88178c2b98b9238d8a6a62b51d9cb12b6661bf2671ed1aaa4
    container_name: lgos-bifrost
    restart: "no"
    depends_on:
      lgos-demo-api:
        condition: service_started
    networks:
      - lgos-network
    ports:
      - 8081:8080
    volumes:
      - ./docker/bifrost/config.json:/app/data/config.json:ro
    environment:
      APP_HOST: 0.0.0.0
      LOG_LEVEL: info
      LOG_STYLE: json
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - -O
        - /dev/null
        - http://localhost:8080/health
      interval: 5s
      timeout: 5s
      retries: 10

  lgos-chainlit:
    image: lgos-chainlit:latest
    container_name: lgos-chainlit
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    networks:
      - lgos-network
    depends_on:
      lgos-postgres:
        condition: service_healthy
      lgos-demo-api:
        condition: service_started
      # Enable with the Bifrost pass-through settings below.
      # lgos-bifrost:
      #   condition: service_healthy
    pre_start:
      - command: ["uv", "run", "--module", "demo.ui.chainlit_ui.setup_database"]
    ports:
      - 5000:5000
    command:
      - uv
      - run
      - uvicorn
      - demo.ui.chainlit_ui.main:app
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --no-access-log
    restart: "no"
    env_file:
      - .env
    environment:
      CHAINLIT_APP_ROOT: /app/demo/ui/chainlit_ui
      DATABASE_URL: postgresql://lgos:lgos@lgos-postgres:5432/lgos
      # Direct LGOS is the default. Comment this line when enabling Bifrost.
      DEMO_CHAINLIT_INFERENCE__BASE_URL: http://lgos-demo-api:8000/v1
      # Bifrost raw pass-through preserves LGOS client stream events.
      # DEMO_CHAINLIT_INFERENCE__BASE_URL: http://lgos-bifrost:8080/openai_passthrough/v1
      # DEMO_CHAINLIT_DISCOVERY__BASE_URL: http://lgos-bifrost:8080/openai_passthrough/v1
      # DEMO_CHAINLIT_INFERENCE_MODEL_PREFIX: ""
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:5000/health', timeout=2)
      interval: 10s
      timeout: 5s
      retries: 5
    develop:
      watch:
        # Avoid recursively watching Docker-owned PostgreSQL volume data.
        - action: sync+restart
          path: ./src
          target: /app/src
          ignore:
            - "**/__pycache__/"
        - action: sync+restart
          path: ./demo
          target: /app/demo
          ignore:
            - "**/__pycache__/"
            - tests/
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock

  # NOTE: Disable Title Generation: Admin Panel -> Interface -> Title Generation -> Disable
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:v0.10.2@sha256:9fcea9c6e32ab60b0498f3986c6cdf651ddbe61db48d2213a3d28048ddd673d4
    restart: "no"
    depends_on:
      - lgos-demo-api
    networks:
      - lgos-network
    ports:
      - 8080:8080
    volumes:
      - ./docker/volumes/open-webui:/app/backend/data
    environment:
      ENABLE_PERSISTENT_CONFIG: false
      ############# WEBUI #############
      WEBUI_NAME: LGOS-OpenwebUI
      ENABLE_OLLAMA_API: false
      ENABLE_FOLLOW_UP_GENERATION: false
      ENABLE_TAGS_GENERATION: false
      ENABLE_PIP_INSTALL_FRONTMATTER_REQUIREMENTS: false
      OFFLINE_MODE: true
      HF_HUB_OFFLINE: 1
      ############# AUTH #############
      WEBUI_ADMIN_EMAIL: lgos@example.com
      WEBUI_ADMIN_PASSWORD: lgos
      WEBUI_ADMIN_NAME: LGOS
      ############# OPENAI API #############
      ENABLE_OPENAI_API: false
      ENABLE_IMAGE_GENERATION: false
      ############# RAG #############
      RAG_EMBEDDING_ENGINE: openai
