# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Build demo image
description: Build or publish one of the demo application images.

inputs:
  context:
    description: Docker build context relative to the repository root.
    required: true
  repository:
    description: GHCR image repository name.
    required: true
  platforms:
    description: Comma-separated target platforms.
    default: linux/amd64,linux/arm64
    required: false
  publish:
    description: Whether to publish the image to GHCR.
    default: "false"
    required: false

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Log in to GHCR
      if: inputs.publish == 'true'
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Extract image metadata
      id: metadata
      uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
      with:
        images: ghcr.io/${{ github.repository_owner }}/${{ inputs.repository }}
        flavor: latest=false
        tags: |
          type=sha,prefix=validation-,format=long,enable=${{ inputs.publish != 'true' }}
          type=raw,value=latest,enable=${{ inputs.publish == 'true' && github.ref_type == 'branch' }}
          type=semver,pattern={{version}},enable=${{ inputs.publish == 'true' && github.ref_type == 'tag' }}
          type=sha,prefix=sha-,format=long,enable=${{ inputs.publish == 'true' }}

    - name: Build and push
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: ${{ inputs.context }}
        platforms: ${{ inputs.platforms }}
        pull: true
        push: ${{ inputs.publish == 'true' }}
        tags: ${{ steps.metadata.outputs.tags }}
        labels: ${{ steps.metadata.outputs.labels }}
        sbom: true
        provenance: mode=max
        cache-from: type=gha,scope=${{ inputs.repository }}
        cache-to: type=gha,mode=max,scope=${{ inputs.repository }}
