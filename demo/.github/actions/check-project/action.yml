# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Check demo project
description: Test and lint one locked demo project.

inputs:
  directory:
    description: Relative or absolute project directory.
    required: true
  cache-dependency-glob:
    description: Lockfile path used for the uv cache key.
    required: true
  verify-api-corpus:
    description: Whether to verify that the API wheel contains its demo corpus.
    default: "false"
    required: false

runs:
  using: composite
  steps:
    - name: Set up uv and Python
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        version: "0.11.29"
        python-version: "3.13"
        enable-cache: true
        cache-dependency-glob: ${{ inputs.cache-dependency-glob }}

    - name: Run tests
      shell: bash
      env:
        PROJECT_DIR: ${{ inputs.directory }}
      run: uv run --directory "$PROJECT_DIR" --locked pytest

    - name: Check lint and formatting
      shell: bash
      env:
        PROJECT_DIR: ${{ inputs.directory }}
      run: |
        uv run --directory "$PROJECT_DIR" --locked ruff check src tests
        uv run --directory "$PROJECT_DIR" --locked ruff format --check src tests

    - name: Verify the packaged API corpus
      if: inputs.verify-api-corpus == 'true'
      shell: bash
      env:
        PROJECT_DIR: ${{ inputs.directory }}
      run: |
        uv build "$PROJECT_DIR" --wheel --out-dir "${{ runner.temp }}/dist"
        wheel="$(find "${{ runner.temp }}/dist" -name '*.whl' -print -quit)"
        unzip -Z1 "$wheel" | grep -qx 'lgos_demo_api/corpus/overview.md'
