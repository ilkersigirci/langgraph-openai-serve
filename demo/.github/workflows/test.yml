---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Test demo projects

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compose:
    name: Validate Compose
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Render published and development models
        run: |
          docker compose -f compose.yaml config --quiet
          docker compose -f compose.yaml -f compose.dev.yaml config --quiet

  test:
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: API
            directory: api
          - name: Chainlit
            directory: ui/chainlit_ui
          - name: Open WebUI
            directory: ui/openwebui
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Check project
        uses: ./.github/actions/check-project
        with:
          directory: ${{ matrix.directory }}
          cache-dependency-glob: ${{ matrix.directory }}/uv.lock
          verify-api-corpus: ${{ matrix.name == 'API' }}
